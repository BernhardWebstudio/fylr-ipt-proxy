name: CI

on:
    push:
        branches:
            - main
    pull_request: ~
    workflow_dispatch: ~

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

jobs:
    tests:
        name: Tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.4'
                  extensions: apcu, intl, pdo_pgsql, zip
                  coverage: none
            - name: Install dependencies
              run: |
                  composer install --prefer-dist --no-progress --no-interaction --no-scripts
                  php bin/console importmap:install
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
            - name: Build Docker images
              uses: docker/bake-action@v6
              with:
                  pull: true
                  load: true
                  files: |
                      compose.yaml
                      compose.override.yaml
                  set: |
                      *.cache-from=type=gha,scope=${{github.ref}}
                      *.cache-from=type=gha,scope=refs/heads/main
                      *.cache-to=type=gha,scope=${{github.ref}},mode=max
            - name: Generate database SSL certificates
              run: |
                  mkdir -p docker/db/ssl
                  openssl req -new -x509 -days 3650 -nodes -subj "/CN=PostgreSQL CA" -keyout docker/db/ssl/ca.key -out docker/db/ssl/ca.crt
                  openssl req -new -nodes -subj "/CN=postgres" -keyout docker/db/ssl/server.key -out docker/db/ssl/server.csr
                  openssl x509 -req -in docker/db/ssl/server.csr -CA docker/db/ssl/ca.crt -CAkey docker/db/ssl/ca.key -CAcreateserial -days 3650 -out docker/db/ssl/server.crt
                  chmod 600 docker/db/ssl/server.key docker/db/ssl/ca.key
                  chmod 644 docker/db/ssl/server.crt docker/db/ssl/ca.crt
                  docker run --rm -v "$(pwd)/docker/db/ssl:/ssl" alpine sh -c "chown 70:70 /ssl/server.key /ssl/server.crt /ssl/ca.crt /ssl/ca.key"
            - name: Free ports 80 and 443
              run: |
                  sudo systemctl stop apache2 || true
            - name: Start services
              run: docker compose up --wait --no-build
              continue-on-error: true

            - name: "Debug: dump Docker Compose state and logs (always)"
              run: |
                  echo "==== docker ps ===="
                  docker ps -a || true
                  echo "==== docker compose ps ===="
                  docker compose ps || true
                  echo "==== php container inspect (State and Health) ===="
                  PHP_ID=$(docker compose ps -q php) || true
                  if [ -n "$PHP_ID" ]; then
                    docker inspect --format='{{json .State}}' "$PHP_ID" || true
                    docker inspect --format='{{json .State.Health}}' "$PHP_ID" || true
                    docker inspect --format='{{json .State.Health.Log}}' "$PHP_ID" || true
                  fi
                  echo "==== docker compose logs ===="
                  docker compose logs --timestamps || true
            - name: Check HTTP reachability
              run: curl -v --fail-with-body http://localhost
            - name: Check HTTPS reachability
              run: curl -v --insecure --fail-with-body https://localhost
            - name: Check Mercure reachability
              run: curl -vI --insecure --fail-with-body https://localhost/.well-known/mercure?topic=test
            - name: Create test database
              run: docker compose exec -T php bin/console -e test doctrine:database:create
            - name: Run migrations
              run: docker compose exec -T php bin/console -e test doctrine:migrations:migrate --no-interaction
            - name: Run PHPUnit
              run: docker compose exec -T php bin/phpunit
            - name: Doctrine Schema Validator
              run: docker compose exec -T php bin/console -e test doctrine:schema:validate
    lint:
        name: Docker Lint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Lint Dockerfile
              uses: hadolint/hadolint-action@v3.1.0
